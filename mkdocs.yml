      - OOP — Inheritance: 01-java-foundations/13-oop-inheritance.md
      - OOP — Polymorphism: 01-java-foundations/14-oop-polymorphism.md
      - OOP — Abstraction: 01-java-foundations/15-oop-abstraction.md
      - Encapsulation: 01-java-foundations/16-encapsulation.md
      - Collections: 01-java-foundations/17-collections.md
